<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WK Tactics Console | 戦力・バフ・突撃シミュレーター</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- React & React DOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for JSX Compilation in Browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    /* Styling Custom scrollbars and styling similar to the original app */
    body {
      background-color: #0b0f19;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
    }
    
    .glow-accent {
      text-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
    }
    
    .glow-panel {
      box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.7), 0 0 20px 1px rgba(59, 130, 246, 0.05);
    }

    /* Input focus custom border style */
    input, select {
      transition: all 0.2s ease-in-out;
    }
    
    /* Removing number arrows for clean mono style */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body class="selection:bg-blue-500/30 selection:text-blue-200">

  <div id="root">
    <div class="flex items-center justify-center min-h-screen py-10 px-4">
      <div class="text-center space-y-3">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mx-auto"></div>
        <p class="text-xs text-gray-500 font-mono">Consoles loading...</p>
      </div>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TIER_TABLE = {
      T9: 45,
      T10: 60,
      T11: 80,
      T12: 100,
    };

    const REWARD_STAGES = [
      [10000, 100],
      [20000, 150],
      [40000, 200],
      [100000, 250],
      [200000, 300],
      [300000, 350],
      [400000, 400],
      [600000, 450],
      [800000, 500],
      [1000000, 600],
      [1500000, 200],
    ];

    function App() {
      const [mode, setMode] = useState('WK');
      const [tier, setTier] = useState('T10');
      
      const [currentWK, setCurrentWK] = useState('0');
      const [currentDeathPt, setCurrentDeathPt] = useState('0');
      const [desiredBuff, setDesiredBuff] = useState('');
      const [targetPower, setTargetPower] = useState('1000000');

      const [aftershockEnabled, setAftershockEnabled] = useState(true);
      const [aftershockRate, setAftershockRate] = useState(20);
      
      const [result, setResult] = useState(null);
      const [copied, setCopied] = useState(false);
      const [animating, setAnimating] = useState(false);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const wkParam = params.get('wk');
        const deathParam = params.get('death');
        const tierParam = params.get('tier');
        const modeParam = params.get('mode');

        if (wkParam) setCurrentWK(wkParam);
        if (deathParam) setCurrentDeathPt(deathParam);
        if (tierParam) {
          const upperTier = tierParam.toUpperCase();
          if (TIER_TABLE[upperTier]) setTier(upperTier);
        }
        if (modeParam && (modeParam === 'WK' || modeParam === 'Buff' || modeParam === 'Power')) {
          setMode(modeParam);
        }
      }, []);

      const handleCalculate = (
        currentModeValue = mode,
        currentTier = tier,
        wkVal = currentWK,
        deathVal = currentDeathPt,
        buffValRaw = desiredBuff,
        powerValRaw = targetPower,
        aftershock = aftershockEnabled,
        aftershockPct = aftershockRate
      ) => {
        const wk = parseInt(wkVal) || 0;
        const deathPt = parseInt(deathVal) || 0;
        const unitPt = TIER_TABLE[currentTier];

        let missingPt = 0;
        let neededWK = 0;
        let obtainedBuff = 0;
        let reqDeathPt = 0;

        if (currentModeValue === 'WK') {
          let deathWK = 0;
          REWARD_STAGES.forEach(([pt, rw]) => {
            if (deathPt >= pt) deathWK += rw;
          });

          for (let p = 2000000; p <= 100000000; p += 500000) {
            if (deathPt >= p) {
              deathWK += 200;
            } else {
              break;
            }
          }

          const otherWK = wk - deathWK;
          neededWK = 10000 - otherWK;
          
          let cumulative = 0;
          let targetPt = null;

          for (const [pt, rw] of REWARD_STAGES) {
            cumulative += rw;
            if (cumulative >= neededWK) {
              targetPt = pt;
              break;
            }
          }

          if (!targetPt) {
            let curPt = 1500000;
            for (let p = 2000000; p <= 100000000; p += 500000) {
              cumulative += 200;
              curPt = p;
              if (cumulative >= neededWK) {
                targetPt = curPt;
                break;
              }
            }
          }

          missingPt = Math.max(0, (targetPt || 0) - deathPt);
          obtainedBuff = Math.floor((targetPt || 0) * 1.2);

          const deathUnits = Math.ceil(missingPt / unitPt);

          setResult({
            deathUnits,
            missingPt,
            neededWK,
            obtainedBuff,
          });

        } else if (currentModeValue === 'Buff') {
          const buffVal = (parseInt(buffValRaw) || 0) * 10000;
          reqDeathPt = Math.ceil(buffVal / 1.2);
          missingPt = Math.max(0, reqDeathPt - deathPt);
          
          const deathUnits = Math.ceil(missingPt / unitPt);

          setResult({
            deathUnits,
            missingPt,
            reqDeathPt,
          });

        } else if (currentModeValue === 'Power') {
          const targetPowerInput = parseInt(powerValRaw) || 0;
          
          const realDeathRate = aftershock ? 0.30 * (1 - (aftershockPct / 100)) : 0.30;
          missingPt = Math.ceil(targetPowerInput / (1.2 - realDeathRate));

          const attackUnits = Math.ceil(missingPt / unitPt);
          const expectedDeath = Math.floor(attackUnits * realDeathRate);
          const expectedHospital = attackUnits - expectedDeath;
          const actualEarnedPower = attackUnits * unitPt * 1.2;
          const lostPower = expectedDeath * unitPt;
          const netPowerGain = actualEarnedPower - lostPower;
          const deathUnits = expectedDeath;

          setResult({
            deathUnits,
            missingPt,
            attackUnits,
            expectedHospital,
            expectedDeath,
            actualEarnedPower,
            lostPower,
            netPowerGain,
          });
        }
      };

      const triggerAnalysis = () => {
        setAnimating(true);
        setTimeout(() => {
          handleCalculate();
          setAnimating(false);
        }, 300);
      };

      useEffect(() => {
        handleCalculate(mode, tier, currentWK, currentDeathPt, desiredBuff, targetPower, aftershockEnabled, aftershockRate);
      }, [mode, tier, currentWK, currentDeathPt, desiredBuff, targetPower, aftershockEnabled, aftershockRate]);

      const copyToClipboard = () => {
        if (!result) return;
        const valueToCopy = mode === 'Power' ? (result.attackUnits || 0).toString() : result.deathUnits.toString();
        navigator.clipboard.writeText(valueToCopy).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      };

      const resetFields = () => {
        setCurrentWK('0');
        setCurrentDeathPt('0');
        setDesiredBuff('');
        setTargetPower('1000000');
        setResult(null);
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-start bg-[#0b0f19] text-[#e2e8f0] px-4 py-8 sm:py-12 select-none">
          <header className="mb-6 text-center max-w-lg w-full relative">
            <div className="absolute inset-0 bg-blue-500/10 blur-3xl rounded-full -z-10" />
            <div className="inline-flex items-center gap-2 px-3 py-1 bg-blue-950/40 border border-blue-800/50 rounded-full text-xs text-blue-400 font-mono mb-3 uppercase tracking-widest">
              <svg className="w-3.5 h-3.5 text-blue-400 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                <path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
              WK Assault Simulation Command
            </div>
            <h1 className="text-2xl sm:text-3xl font-black tracking-tight text-white glow-accent uppercase">
              WK Tactics Console
            </h1>
            <p className="text-xs text-gray-400 mt-1 font-mono">
              砲台突撃 & 戦力減少・復活高精度シミュレーター
            </p>
          </header>

          <main className="w-full max-w-lg">
            <div className="bg-[#121826] border border-[#212c42] rounded-2xl p-5 sm:p-6 glow-panel relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-blue-500/30 via-cyan-400 to-blue-500/30" />
              
              {/* Top Segmented Tabs */}
              <div className="flex p-1 bg-[#0b0f19] rounded-xl border border-[#212c42] mb-6">
                <button
                  type="button"
                  onClick={() => setMode('WK')}
                  className={`flex-1 py-2 rounded-lg text-[11px] sm:text-xs font-bold transition-all duration-200 cursor-pointer ${
                    mode === 'WK'
                      ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/20'
                      : 'text-gray-400 hover:text-white hover:bg-white/5'
                  }`}
                >
                  WK報酬 (1万)
                </button>
                <button
                  type="button"
                  onClick={() => setMode('Buff')}
                  className={`flex-1 py-2 rounded-lg text-[11px] sm:text-xs font-bold transition-all duration-200 cursor-pointer ${
                    mode === 'Buff'
                      ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/20'
                      : 'text-gray-400 hover:text-white hover:bg-white/5'
                  }`}
                >
                  希望バフ基準
                </button>
                <button
                  type="button"
                  onClick={() => setMode('Power')}
                  className={`flex-1 py-2 rounded-lg text-[11px] sm:text-xs font-bold transition-all duration-200 cursor-pointer ${
                    mode === 'Power'
                      ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/20'
                      : 'text-gray-400 hover:text-white hover:bg-white/5'
                  }`}
                >
                  戦力純増目標
                </button>
              </div>

              <div className="space-y-4">
                
                {/* 1. Skill Toggle */}
                {mode === 'Power' && (
                  <div className="bg-[#0b0f19] border border-[#212c42]/80 p-3.5 rounded-xl space-y-3 overflow-hidden transition-all duration-300">
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-2.5">
                        <div className={`p-2 rounded-lg ${aftershockEnabled ? 'bg-sky-500/10 text-sky-400' : 'bg-gray-800/60 text-gray-400'}`}>
                          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                          </svg>
                        </div>
                        <div>
                          <div className="text-xs sm:text-sm font-bold text-white flex items-center gap-1.5">
                            アフターショック効果
                            <span className={`inline-block w-2 h-2 rounded-full ${aftershockEnabled ? 'bg-emerald-500 animate-pulse' : 'bg-gray-600'}`} />
                          </div>
                          <p className="text-[10px] text-gray-400 font-mono">
                            {aftershockEnabled 
                              ? `死亡の${aftershockRate}%が深部治療室へ（死亡率 ${(30 * (1 - aftershockRate/100)).toFixed(1)}% / 治療室 ${(70 + 30 * (aftershockRate/100)).toFixed(1)}%）` 
                              : '標準全滅配分（死亡率 30.0% / 治療室 70.0%）'}
                          </p>
                        </div>
                      </div>
                      
                      <button
                        type="button"
                        onClick={() => setAftershockEnabled(!aftershockEnabled)}
                        className="text-white hover:text-sky-400 focus:outline-none cursor-pointer transition-colors"
                      >
                        {aftershockEnabled ? (
                          <svg className="w-10 h-10 text-sky-400" viewBox="0 0 50 50" fill="currentColor">
                            <rect x="5" y="15" width="40" height="20" rx="10" fill="#1e293b"/>
                            <rect x="6" y="16" width="38" height="18" rx="9" fill="#0369a1"/>
                            <circle cx="35" cy="25" r="7" fill="#ffffff"/>
                          </svg>
                        ) : (
                          <svg className="w-10 h-10 text-gray-600" viewBox="0 0 50 50" fill="currentColor">
                            <rect x="5" y="15" width="40" height="20" rx="10" fill="#1e293b"/>
                            <circle cx="15" cy="25" r="7" fill="#64748b"/>
                          </svg>
                        )}
                      </button>
                    </div>

                    {/* Custom Aftershock rescue rate direct input */}
                    {aftershockEnabled && (
                      <div className="pt-2.5 border-t border-[#212c42]/40 flex items-center justify-between gap-4">
                        <div className="space-y-0.5">
                          <label htmlFor="aftershock-input" className="block text-[10px] font-mono text-gray-400">
                            アフターショック救済率（死亡から生存搬送）
                          </label>
                          <p className="text-[9px] text-gray-500 font-mono">※0%〜100%の任意の数値を入力してください</p>
                        </div>
                        <div className="flex items-center bg-[#121826] border border-[#212c42] rounded-lg px-3 py-1.5 shrink-0 transition-colors focus-within:border-sky-500">
                          <input
                            type="number"
                            min="0"
                            max="100"
                            id="aftershock-input"
                            value={aftershockRate}
                            onChange={(e) => {
                              const val = Math.max(0, Math.min(100, Number(e.target.value) || 0));
                              setAftershockRate(val);
                            }}
                            className="w-12 bg-transparent text-right text-sm font-bold text-white font-mono focus:outline-none"
                          />
                          <span className="text-xs text-gray-400 font-mono ml-1">%</span>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* Form Matrix Area */}
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  
                  {/* Soldier Tier Select */}
                  <div className="space-y-1.5">
                    <label htmlFor="tier-select" className="block text-xs font-bold tracking-wider text-gray-400 uppercase font-mono">
                      兵士ティア
                    </label>
                    <div className="relative">
                      <select
                        id="tier-select"
                        value={tier}
                        onChange={(e) => setTier(e.target.value)}
                        className="w-full bg-[#0b0f19] border border-[#212c42] focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg py-2.5 px-3 text-sm text-white font-mono focus:outline-none appearance-none cursor-pointer"
                      >
                        <option value="T9">T9 (戦力: 45 pt)</option>
                        <option value="T10">T10 (戦力: 60 pt)</option>
                        <option value="T11">T11 (戦力: 80 pt)</option>
                        <option value="T12">T12 (戦力: 100 pt)</option>
                      </select>
                      <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-400">
                        <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                          <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                        </svg>
                      </div>
                    </div>
                  </div>

                  {/* Dynamic inputs conditional toggles */}
                  {mode === 'WK' && (
                    <div className="col-span-1 sm:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div className="space-y-1.5">
                        <div className="flex justify-between items-center">
                          <label htmlFor="currentWK" className="block text-xs font-bold tracking-wider text-gray-400 font-mono">
                            現在WKpt
                          </label>
                          <svg className="w-3.5 h-3.5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7" />
                          </svg>
                        </div>
                        <input
                          id="currentWK"
                          type="number"
                          inputMode="numeric"
                          value={currentWK}
                          onChange={(e) => setCurrentWK(e.target.value)}
                          placeholder="例: 12000"
                          className="w-full bg-[#0b0f19] border border-[#212c42] focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg py-2.5 px-3 text-sm text-white font-mono focus:outline-none"
                        />
                      </div>

                      <div className="space-y-1.5">
                        <div className="flex justify-between items-center">
                          <label htmlFor="currentDeath" className="block text-xs font-bold tracking-wider text-gray-400 font-mono">
                            現在死亡Pt
                          </label>
                          <svg className="w-3.5 h-3.5 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                          </svg>
                        </div>
                        <input
                          id="currentDeath"
                          type="number"
                          inputMode="numeric"
                          value={currentDeathPt}
                          onChange={(e) => setCurrentDeathPt(e.target.value)}
                          placeholder="例: 45000"
                          className="w-full bg-[#0b0f19] border border-[#212c42] focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg py-2.5 px-3 text-sm text-white font-mono focus:outline-none"
                        />
                      </div>
                    </div>
                  )}

                  {mode === 'Buff' && (
                    <div className="col-span-1 sm:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div className="space-y-1.5">
                        <label htmlFor="desiredBuff" className="block text-xs font-bold tracking-wider text-gray-400 font-mono">
                          希望バフ (万単位)
                        </label>
                        <input
                          id="desiredBuff"
                          type="number"
                          inputMode="numeric"
                          value={desiredBuff}
                          onChange={(e) => setDesiredBuff(e.target.value)}
                          placeholder="例: 5 (5万バフ)"
                          className="w-full bg-[#0b0f19] border border-[#212c42] focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg py-2.5 px-3 text-sm text-white font-mono focus:outline-none"
                        />
                      </div>

                      <div className="space-y-1.5">
                        <div className="flex justify-between items-center">
                          <label htmlFor="currentDeathBuffMode" className="block text-xs font-bold tracking-wider text-gray-400 font-mono">
                            現在死亡Pt
                          </label>
                          <svg className="w-3.5 h-3.5 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                          </svg>
                        </div>
                        <input
                          id="currentDeathBuffMode"
                          type="number"
                          inputMode="numeric"
                          value={currentDeathPt}
                          onChange={(e) => setCurrentDeathPt(e.target.value)}
                          placeholder="例: 45000"
                          className="w-full bg-[#0b0f19] border border-[#212c42] focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg py-2.5 px-3 text-sm text-white font-mono focus:outline-none"
                        />
                      </div>
                    </div>
                  )}

                  {mode === 'Power' && (
                    <div className="col-span-1 sm:col-span-2">
                      <div className="space-y-1.5">
                        <label htmlFor="targetPower" className="block text-xs font-bold tracking-wider text-gray-400 font-mono">
                          目標「純増」戦力値 (他兵士の完全死亡・消失を考慮)
                        </label>
                        <input
                          id="targetPower"
                          type="number"
                          inputMode="numeric"
                          value={targetPower}
                          onChange={(e) => setTargetPower(e.target.value)}
                          placeholder="例: 21600000"
                          className="w-full bg-[#0b0f19] border border-[#212c42] focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg py-2.5 px-3 text-sm text-white font-mono focus:outline-none"
                        />
                      </div>
                    </div>
                  )}
                </div>

                {/* Tactical Guideline Box */}
                {mode === 'Power' && (
                  <div className="p-3 bg-blue-950/20 border border-blue-900/50 rounded-xl flex items-start gap-2 overflow-hidden">
                    <svg className="w-4 h-4 text-sky-400 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <div className="text-[11px] text-gray-300 leading-normal space-y-1.5">
                      <div>
                        <strong className="text-sky-400">戦力純増の論理メカニズム（完全死亡補填）</strong>:<br />
                        砲台等に攻撃（出撃全員が全滅）した兵士は、基本設定として<strong>70%が深部治療室に行き（治療後に復活）</strong>、<strong>30%が完全に死亡（消失）</strong>します。
                      </div>
                      <div>
                        アフターショックが有効な場合、その30%の完全死亡のうち<strong>{aftershockRate}%が救済されて深部治療室へ回る</strong>ため、実質的な完全死亡（消失）は<strong>{(30 * (1 - aftershockRate/100)).toFixed(1)}%</strong>となり、深部治療室送りは<strong>{(70 + 30 * (aftershockRate/100)).toFixed(1)}%</strong>になります。
                      </div>
                      <div className="pt-1.5 border-t border-sky-950/40 text-sky-300 font-mono text-[10px]">
                        【損失補填 of 計算式】<br />
                        • 出撃（突撃）した兵士全員のptが1.2倍バフ（+120%）に計上されます。<br />
                        • 一方、完全に死亡した兵士分（30% または {(30 * (1 - aftershockRate/100)).toFixed(1)}%）はそのまま消失（-100%）します。<br />
                        • 深部治療室に行った兵士は、後で復活して戻るため、実質的な戦力減少はありません。<br />
                        • 実質的な戦力純増率 ＝ 1.20 (バフ) － 完全死亡率 ({aftershockEnabled ? `${(0.3 * (1 - aftershockRate/100)).toFixed(3)}` : '0.300'}) ＝ ＋{aftershockEnabled ? `${(1.2 - 0.3 * (1 - aftershockRate/100)).toFixed(3)}` : '0.900'}倍<br />
                        • 必要となる出撃総戦力 ＝ 目標純増戦力 ÷ 実質純増率
                      </div>
                    </div>
                  </div>
                )}

                {/* Command Action Buttons */}
                <div className="flex gap-2 pt-2">
                  <button
                    type="button"
                    onClick={triggerAnalysis}
                    className="flex-1 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3 px-4 rounded-xl text-xs sm:text-sm tracking-widest transition-all duration-200 active:scale-95 cursor-pointer shadow-lg shadow-blue-500/15 flex items-center justify-center gap-2"
                  >
                    <svg className="w-4 h-4 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    </svg>
                    再計算する
                  </button>

                  <button
                    type="button"
                    onClick={resetFields}
                    className="px-4 py-3 bg-[#0b0f19] hover:bg-white/5 border border-[#212c42] text-gray-400 hover:text-white rounded-xl transition-all duration-200 cursor-pointer"
                    title="フィールドをクリア"
                  >
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 4.89M9 11l3-3m0 0l3 3m-3-3v8" />
                    </svg>
                  </button>
                </div>

              </div>
            </div>

            {/* Results Console Terminal */}
            {result && (
              <div className={`mt-6 space-y-4 transition-all duration-300 ${animating ? 'opacity-40 scale-[0.99] blur-[1px]' : 'opacity-100 scale-100'}`}>
                <div className="bg-[#121826] border border-[#212c42] rounded-2xl p-5 sm:p-6 glow-panel relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-emerald-500/30 via-emerald-400 to-emerald-500/30" />
                  
                  <div className="flex justify-between items-center mb-4">
                    <div className="flex items-center gap-2">
                      <span className="flex h-2 w-2 relative">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                      </span>
                      <h2 className="text-xs font-bold tracking-wider text-gray-400 uppercase font-mono">
                        ANALYSIS OUTPUT TERMINAL
                      </h2>
                    </div>

                    <button
                      type="button"
                      onClick={copyToClipboard}
                      className="px-2.5 py-1.5 bg-[#0b0f19] hover:bg-[#212c42] border border-[#212c42] rounded-lg text-[10px] font-bold font-mono text-gray-400 hover:text-white flex items-center gap-1.5 transition-colors cursor-pointer"
                    >
                      {copied ? (
                        <React.Fragment>
                          <svg className="w-3 h-3 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                          </svg>
                          <span className="text-emerald-400 text-[9px]">コピー済!</span>
                        </React.Fragment>
                      ) : (
                        <React.Fragment>
                          <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                          </svg>
                          <span>{mode === 'Power' ? '出撃数をコピー' : '不足兵士数をコピー'}</span>
                        </React.Fragment>
                      )}
                    </button>
                  </div>

                  {/* Primary Output Display metrics */}
                  <div className="bg-[#0b0f19] border border-[#212c42]/60 rounded-xl p-4 text-center relative overflow-hidden">
                    <span className="absolute top-2 right-3 font-mono text-[9px] text-gray-600">PRIMARY VALUE</span>
                    <div className="text-[10px] text-gray-400 font-bold tracking-wider font-mono uppercase mb-0.5">
                      {mode === 'Power' ? '砲台等へ出撃（全滅）させるべき総兵士数' : '最低追加で死亡・消失させる兵数'}
                    </div>
                    <div className="text-3xl sm:text-4xl font-extrabold text-white tracking-tight drop-shadow font-mono flex items-center justify-center gap-1">
                      {mode === 'Power' 
                        ? (result.attackUnits || 0).toLocaleString() 
                        : result.deathUnits.toLocaleString()
                      }
                      <span className="text-xs sm:text-sm font-semibold text-gray-400 ml-1">兵士</span>
                    </div>
                  </div>

                  <div className="mt-4 space-y-2 text-xs font-mono">
                    {mode === 'WK' && (
                      <React.Fragment>
                        <div className="flex justify-between items-center text-amber-400 font-bold">
                          <span>不足しているWKpt</span>
                          <span>{result.neededWK?.toLocaleString()} pt</span>
                        </div>
                        <div className="flex justify-between items-center text-gray-300">
                          <span>獲得想定バフ戦力 (+120%)</span>
                          <span>+{result.obtainedBuff?.toLocaleString()} pt</span>
                        </div>
                        <div className="flex justify-between items-center pt-2 border-t border-[#212c42]/40 text-rose-400">
                          <span>不足している死亡Pt数</span>
                          <span>{result.missingPt?.toLocaleString()} pt</span>
                        </div>
                      </React.Fragment>
                    )}

                    {mode === 'Buff' && (
                      <React.Fragment>
                        <div className="flex justify-between items-center text-blue-400 font-bold">
                          <span>希望バフに必要な総死亡Pt</span>
                          <span>{result.reqDeathPt?.toLocaleString()} pt</span>
                        </div>
                        <div className="flex justify-between items-center pt-2 border-t border-[#212c42]/40 text-rose-400">
                          <span>不足している死亡Pt数</span>
                          <span>{result.missingPt?.toLocaleString()} pt</span>
                        </div>
                      </React.Fragment>
                    )}

                    {mode === 'Power' && (
                      <React.Fragment>
                        <div className="flex justify-between items-center text-sky-400 font-bold pb-1 border-b border-[#212c42]/20">
                          <span>目標戦力ネット純増値</span>
                          <span>+{result.netPowerGain?.toLocaleString()} pt (目標: {parseInt(targetPower).toLocaleString()})</span>
                        </div>
                        <div className="flex justify-between items-center text-emerald-400">
                          <span>獲得する想定バフ戦力 (+120%)</span>
                          <span>+{Math.floor(result.actualEarnedPower || 0).toLocaleString()} pt</span>
                        </div>
                        <div className="flex justify-between items-center text-rose-500 text-[11px] pl-3">
                          <span>↳ 完全に死亡・消失する兵士の戦力 (-100%)</span>
                          <span className="font-bold">-{result.lostPower?.toLocaleString()} pt</span>
                        </div>
                        <div className="flex justify-between items-center text-emerald-500 text-[11px] pl-3">
                          <span>↳ 差し引き発生する実質純増 (バフ120% - 消失100% = +20%)</span>
                          <span className="font-bold">+{Math.floor((result.actualEarnedPower || 0) - (result.lostPower || 0)).toLocaleString()} pt</span>
                        </div>
                        <div className="flex justify-between items-center pt-2 border-t border-[#212c42]/40 text-gray-300">
                          <span>必要とされる確定死亡Pt</span>
                          <span className="font-bold text-orange-400">{result.missingPt.toLocaleString()} pt</span>
                        </div>
                        <div className="flex justify-between items-center">
                          <span>本当に死亡・消失させるべき人数</span>
                          <span className="text-rose-400 font-bold">{result.deathUnits.toLocaleString()} 兵士</span>
                        </div>
                      </React.Fragment>
                    )}
                  </div>

                  {/* Dynamic Tactical analysis helper text */}
                  <div className="mt-5 p-3.5 bg-emerald-950/20 border border-emerald-900/40 rounded-xl flex gap-2.5">
                    <svg className="w-4 h-4 text-emerald-400 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <div className="text-[11px] leading-relaxed text-gray-300">
                      {mode === 'Power' ? (
                        <React.Fragment>
                          <strong className="text-emerald-400">高精度分析シグナル:</strong><br />
                          目標の「純増戦力 +{parseInt(targetPower).toLocaleString()}」を確実に手に入れるには、兵士が死亡（消失）した損失分をバフで相殺したうえで、不足のないように出撃させる必要があります。<br />
                          生存割合を厳密に考慮すると、このティアで砲台攻撃に向かわせる（突撃全滅させる）べき総兵士数は<strong className="text-white">{(result.attackUnits || 0).toLocaleString()}名</strong>になります。
                        </React.Fragment>
                      ) : (
                        <React.Fragment>
                          <strong className="text-emerald-400">高精度分析シグナル:</strong><br />
                          算定された必要追加死亡（消失）兵数は、現在の死亡Ptから算出した確定値です。攻撃全滅により深部治療室に行く割合を考慮した「実出撃兵数」は、攻撃時の生存割合をご確認のうえ調整してください。
                        </React.Fragment>
                      )}
                    </div>
                  </div>

                </div>
              </div>
            )}
          </main>

          <footer className="mt-8 text-center text-[10px] text-gray-500 font-mono space-y-1">
            <p>© 2026 WK Tactics Console. All rights reserved.</p>
            <p>Calculated using high-precision combat ratios & Aftershock adjustments.</p>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
